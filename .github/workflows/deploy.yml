name: deploy to AWS EC2

on: 
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: 
      - completed

jobs: 
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success'}}
    
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: set up ssh key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: deploy ec2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          sudo docker stop devops-app || true
          sudo docker rm devops-app || true
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:v2
          sudo docker run -d -p 80:3000 --name devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:v2
          EOF
