name: Pull and Deploy Artifacts

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]   # must match exact name
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop devops-app || true
            docker rm devops-app || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:v1
            docker run -d -p 80:3000 --name devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:v1